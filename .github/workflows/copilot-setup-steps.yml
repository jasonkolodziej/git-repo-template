name: "Copilot Setup Steps"

# Run the setup steps when they change (validates the workflow) and allow
# manual test runs from the Actions tab.
on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    # This job MUST be named `copilot-setup-steps` for the cloud agent to pick it up.
    copilot-setup-steps:
        runs-on: ubuntu-latest

        # Minimal permissions required for the setup steps below.
        # Copilot is granted its own token for its own operations.
        permissions:
            contents: read

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

